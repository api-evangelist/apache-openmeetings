aid: apache-openmeetings
name: Apache OpenMeetings
description: >-
  Apache OpenMeetings is a web conferencing and collaboration tool that provides video conferencing, instant messaging, white board, collaborative document editing, and other groupware tools. It offers
  integration APIs for LMS platforms.
