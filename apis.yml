- aid: apache-openmeetings:apache-openmeetings-rest-api
  name: Apache OpenMeetings REST API
  description: >-
    The OpenMeetings REST API provides endpoints for managing rooms, users, recordings, calendars, and file uploads, with SOAP API support for legacy integrations and plugin APIs for LMS integration (Moodle,
    Sakai).
