      operations:
      - name: save
        method: POST
        description: Apache OpenMeetings Save
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: calendar-next
      path: /calendar/next
      operations:
      - name: next
