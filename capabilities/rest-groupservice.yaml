    - name: apache-openmeetings-addroom
      description: Apache OpenMeetings AddRoom
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-groupservice.addroom
      with:
        sid: tools.sid
        id: tools.id
        roomid: tools.roomid
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-openmeetings-adduser
      description: Apache OpenMeetings AddUser
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-groupservice.adduser
      with:
        sid: tools.sid
        id: tools.id
        userid: tools.userid
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-openmeetings-removeuser
      description: Apache OpenMeetings RemoveUser
      hints:
        readOnly: false
