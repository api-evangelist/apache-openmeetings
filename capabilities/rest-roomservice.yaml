naftiko: 1.0.0-alpha2
info:
  label: Apache OpenMeetings REST API — RoomService
  description: 'Apache OpenMeetings REST API — RoomService. 12 operations. Lead operation: Apache OpenMeetings Add_2. Self-contained
    Naftiko capability covering one Apache Openmeetings business surface.'
  tags:
  - Apache Openmeetings
  - RoomService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_OPENMEETINGS_API_KEY: APACHE_OPENMEETINGS_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-roomservice
    baseUri: https://{host}:5443/openmeetings/services
    description: Apache OpenMeetings REST API — RoomService business capability. Self-contained, no shared references.
    resources:
    - name: room
      path: /room
      operations:
      - name: add2
        method: POST
        description: Apache OpenMeetings Add_2
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: room-close-id
      path: /room/close/{id}
      operations:
      - name: close
        method: GET
        description: Apache OpenMeetings Close
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the room id
          required: true
    - name: room-count-roomid
      path: /room/count/{roomid}
      operations:
      - name: count
        method: GET
        description: Apache OpenMeetings Count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: roomid
          in: path
          type: integer
          description: roomId id of the room to get users
          required: true
    - name: room-hash
      path: /room/hash
      operations:
      - name: hash
        method: POST
        description: Apache OpenMeetings Hash
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: invite
          in: query
          type: string
          description: parameters of the invitation
          required: true
        - name: sendmail
          in: query
          type: boolean
          description: flag to determine if email should be sent or not
          required: true
    - name: room-kick-id
      path: /room/kick/{id}
      operations:
      - name: kickall
        method: GET
        description: Apache OpenMeetings KickAll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the room id
          required: true
    - name: room-kick-id-externalType-externalId
      path: /room/kick/{id}/{externalType}/{externalId}
      operations:
      - name: kick
        method: GET
        description: Apache OpenMeetings Kick
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the room id
          required: true
        - name: externalType
          in: path
          type: string
          description: external type of USER to kick
          required: true
        - name: externalId
          in: path
          type: string
          description: external id of USER to kick
          required: true
    - name: room-open-id
      path: /room/open/{id}
      operations:
      - name: open
        method: GET
        description: Apache OpenMeetings Open
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the room id
          required: true
    - name: room-public-type
      path: /room/public/{type}
      operations:
      - name: getpublic
        method: GET
        description: Apache OpenMeetings GetPublic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: type
          in: path
          type: string
          description: Type of public rooms need to be retrieved
          required: true
    - name: room-users-roomid
      path: /room/users/{roomid}
      operations:
      - name: users
        method: GET
        description: Apache OpenMeetings Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: roomid
          in: path
          type: integer
          description: roomId id of the room to get users
          required: true
    - name: room-id
      path: /room/{id}
      operations:
      - name: getroombyid
        method: GET
        description: Apache OpenMeetings GetRoomById
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the room id
          required: true
      - name: delete4
        method: DELETE
        description: Apache OpenMeetings Delete_4
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: The id of the room
          required: true
    - name: room-type-externaltype-externalid
      path: /room/{type}/{externaltype}/{externalid}
      operations:
      - name: getexternal1
        method: GET
        description: Apache OpenMeetings GetExternal_1
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: type
          in: path
          type: string
          description: type of the room
          required: true
        - name: externaltype
          in: path
          type: string
          description: you can specify your system-name or type of room here, for example "moodle"
          required: true
        - name: externalid
          in: path
          type: string
          description: your external room id may set here
          required: true
        - name: room
          in: query
          type: string
          description: details of the room to be created if not found
          required: true
  exposes:
