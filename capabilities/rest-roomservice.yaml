    - path: /v1/room
      name: room
      description: REST surface for room.
      operations:
      - method: POST
        name: add2
        description: Apache OpenMeetings Add_2
        call: rest-roomservice.add2
        with:
          sid: rest.sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/room/close/{id}
