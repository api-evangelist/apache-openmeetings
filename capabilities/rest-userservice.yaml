    namespace: rest-userservice
    baseUri: https://{host}:5443/openmeetings/services
    description: Apache OpenMeetings REST API — UserService business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: get3
        method: GET
        description: Apache OpenMeetings Get_3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
      - name: add3
        method: POST
        description: Apache OpenMeetings Add_3
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: user-hash
      path: /user/hash
      operations:
      - name: getroomhash
        method: POST
        description: Apache OpenMeetings GetRoomHash
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: user-login
      path: /user/login
      operations:
      - name: login
        method: POST
        description: Apache OpenMeetings Login
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: user-externaltype-externalid
      path: /user/{externaltype}/{externalid}
      operations:
      - name: deleteexternal1
        method: DELETE
        description: Apache OpenMeetings DeleteExternal_1
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: externaltype
          in: path
          type: string
          description: externalUserId
          required: true
        - name: externalid
          in: path
          type: string
          description: externalType
          required: true
    - name: user-id
      path: /user/{id}
      operations:
      - name: delete5
        method: DELETE
        description: Apache OpenMeetings Delete_5
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sid
          in: query
          type: string
          description: The SID of the User. This SID must be marked as Loggedin
          required: true
        - name: id
          in: path
          type: integer
          description: the openmeetings user id
          required: true
  exposes:
  - type: rest
    namespace: rest-userservice-rest
    port: 8080
    description: REST adapter for Apache OpenMeetings REST API — UserService. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: get3
        description: Apache OpenMeetings Get_3
        call: rest-userservice.get3
        with:
          sid: rest.sid
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: add3
        description: Apache OpenMeetings Add_3
        call: rest-userservice.add3
        with:
          sid: rest.sid
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
