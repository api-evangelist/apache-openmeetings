        - name: wbs
          path: /wb
          description: "WbService operations"
          operations:
            - name: cleanSlide
              method: GET
              description: "Apache OpenMeetings CleanSlide"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
