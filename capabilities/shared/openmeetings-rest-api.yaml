naftiko: "1.0.0-alpha1"

info:
  label: "Apache OpenMeetings REST API"
  description: "Apache OpenMeetings REST API for managing conferencing rooms, users, recordings, calendars, and files."
  tags:
    - Apache OpenMeetings
    - Conferencing
    - Collaboration
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      OPENMEETINGS_API_KEY: OPENMEETINGS_API_KEY

capability:
  consumes:
    - type: http
      namespace: openmeetings
      baseUri: https://localhost:5443/openmeetings/services
      description: "Apache OpenMeetings REST API"
      authentication:
        type: apikey
        key: Authorization
        value: "{{OPENMEETINGS_API_KEY}}"
        placement: header
      resources:
        - name: calendars
          path: /calendar
          description: "CalendarService operations"
          operations:
            - name: delete
              method: DELETE
              description: "Apache OpenMeetings Delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getByRoom
              method: GET
              description: "Apache OpenMeetings GetByRoom"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getByTitle
              method: GET
              description: "Apache OpenMeetings GetByTitle"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: next
              method: GET
              description: "Apache OpenMeetings Next"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: nextForUser
              method: GET
              description: "Apache OpenMeetings NextForUser"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: errors
          path: /error
          description: "ErrorService operations"
          operations:
            - name: get
              method: GET
              description: "Apache OpenMeetings Get"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: report
              method: POST
              description: "Apache OpenMeetings Report"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: files
          path: /file
          description: "FileService operations"
          operations:
            - name: add
              method: POST
              description: "Apache OpenMeetings Add"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete_1
              method: DELETE
              description: "Apache OpenMeetings Delete_1"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteExternal
              method: DELETE
              description: "Apache OpenMeetings DeleteExternal"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getAllExternal
              method: GET
              description: "Apache OpenMeetings GetAllExternal"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getRoom
              method: GET
              description: "Apache OpenMeetings GetRoom"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /group
          description: "GroupService operations"
          operations:
            - name: get_1
              method: GET
              description: "Apache OpenMeetings Get_1"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add_1
              method: POST
              description: "Apache OpenMeetings Add_1"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addRoom
