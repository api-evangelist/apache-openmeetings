                - name: result
                  type: object
                  value: "$."
            - name: getManifest
              method: GET
              description: "Apache OpenMeetings GetManifest"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getVersion
              method: GET
              description: "Apache OpenMeetings GetVersion"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nettests
          path: /nettest
          description: "NetTestService operations"
          operations:
