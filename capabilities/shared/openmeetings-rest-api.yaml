            - name: cleanWb
              method: GET
              description: "Apache OpenMeetings CleanWb"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resetWb
              method: GET
              description: "Apache OpenMeetings ResetWb"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: uploadWb
              method: POST
              description: "Apache OpenMeetings UploadWb"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: openmeetings-rest
      resources:
        - path: /v1/rooms
          name: rooms
          description: "Conference room management"
          operations:
            - method: GET
              name: list-rooms
              description: "List conference rooms"
              call: "openmeetings.getPublic"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "User management"
          operations:
            - method: GET
              name: list-users
              description: "List users"
              call: "openmeetings.get_3"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: openmeetings-mcp
      transport: http
      tools:
        - name: list-rooms
          description: "List all public conference rooms"
          hints:
            readOnly: true
          call: "openmeetings.getPublic"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List all users"
          hints:
            readOnly: true
          call: "openmeetings.get_3"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-room
          description: "Create a new conference room"
          hints:
            readOnly: false
          call: "openmeetings.add_2"
          outputParameters:
            - type: object
              mapping: "$."
        - name: login-user
          description: "Authenticate a user"
          hints:
            readOnly: false
          call: "openmeetings.login"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-room-hash
          description: "Generate a secure room access hash"
          hints:
            readOnly: false
          call: "openmeetings.hash"
          outputParameters:
            - type: object
              mapping: "$."
