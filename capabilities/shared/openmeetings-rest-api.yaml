            - name: getExternalByRoom
              method: GET
              description: "Apache OpenMeetings GetExternalByRoom"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getExternalByType
              method: GET
              description: "Apache OpenMeetings GetExternalByType"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: rooms
          path: /room
          description: "RoomService operations"
          operations:
            - name: add_2
              method: POST
              description: "Apache OpenMeetings Add_2"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
