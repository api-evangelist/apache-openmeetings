            - name: delete_5
              method: DELETE
              description: "Apache OpenMeetings Delete_5"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteExternal_1
              method: DELETE
              description: "Apache OpenMeetings DeleteExternal_1"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getRoomHash
              method: POST
              description: "Apache OpenMeetings GetRoomHash"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
